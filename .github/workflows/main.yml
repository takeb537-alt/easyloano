name: Build EasyLoan APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.22.0
          channel: stable
          cache: true

      - name: Verify Flutter project structure
        run: |
          echo "=== Repo structure ==="
          ls -la
          echo "=== Checking android folder ==="
          if [ ! -d "android" ]; then
            echo "ERROR: android/ folder missing. Creating Flutter project scaffold..."
            flutter create --project-name easyloan --org com.easyloan . --overwrite
          else
            echo "android/ folder exists. Good."
          fi

      - name: Flutter clean
        run: flutter clean

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: easyloan-release-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30
          if-no-files-found: error
